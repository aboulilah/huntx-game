<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>HUNT_X — Profile</title>
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="shell" style="padding-bottom: 88px;">

    <!-- Page header -->
    <div class="header">
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00FFC2" stroke-width="2.5"><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        Profile
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    </div>

    <!-- Avatar -->
    <div style="display:flex;flex-direction:column;align-items:center;padding:16px 24px 8px;">
      <div style="position:relative;width:128px;height:128px;margin-bottom:16px;">
        <img src="assets/avatar-placeholder.jpg" alt="Profile photo"
          style="width:128px;height:128px;border-radius:999px;object-fit:cover;border:3px solid #00FFC2;box-shadow:0 0 20px rgba(0,255,194,0.55), 0 0 45px rgba(0,255,194,0.25);" />
        <div class="mono" style="position:absolute;bottom:-4px;right:-4px;background:#00FFC2;color:#000;font-size:9px;font-weight:800;letter-spacing:0.05em;padding:4px 10px;border-radius:999px;display:flex;align-items:center;gap:4px;">
          <span style="width:6px;height:6px;border-radius:999px;background:#000;"></span>
          ACTIVE
        </div>
      </div>

      <!-- Changed the color to #00ffc2 here -->
      <h1 class="glow-text-magenta" style="font-size:22px;font-weight:800;letter-spacing:0.02em;margin-bottom:10px;color:#00ffc2;">ABDOU</h1>

      <div class="glass" style="padding:6px 16px;border-radius:999px;">
        <span class="mono" style="font-size:11px;letter-spacing:0.08em;color:#00FFC2;">RANK: ELITE_SCAVENGER</span>
      </div>
    </div>

    <!-- Stat cards -->
    <div style="display:flex;flex-direction:column;gap:12px;padding:24px 24px 0;">

      <div class="glass" style="border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="width:36px;height:36px;border-radius:10px;background:rgba(0,255,194,0.1);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00FFC2" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
          </div>
          <span style="font-size:24px;font-weight:800;color:#f4f4f5;">1402</span>
        </div>
        <span class="mono" style="font-size:11px;letter-spacing:0.08em;color:#71717a;">SCANS</span>
      </div>

      <div class="glass" style="border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="width:36px;height:36px;border-radius:10px;background:rgba(0,255,194,0.1);display:flex;align-items:center;justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00FFC2" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </div>
          <span class="glow-text" style="font-size:24px;font-weight:800;color:#00FFC2;">45,200</span>
        </div>
        <span class="mono" style="font-size:11px;letter-spacing:0.08em;color:#71717a;">TOTAL_XP</span>
      </div>

    </div>

    <nav class="bottom-nav glass">
      <a href="index.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label mono">Home</span>
      </a>
      <a href="profile.html" class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label mono">Profile</span>
      </a>
      <a href="leaderboard.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M17 4h3a2 2 0 0 1 2 2c0 2-2 4-4 4M7 4H4a2 2 0 0 0-2 2c0 2 2 4 4 4"/></svg>
        <span class="nav-label mono">Leaderboard</span>
      </a>
    </nav>

  </div>
</body>
</html>
