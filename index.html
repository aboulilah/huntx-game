<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>HUNT_X — The Hunt Is On</title>
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="shell" style="padding-bottom: 88px;">

    <div class="header">
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00FFC2" stroke-width="2.5"><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        HUNTX
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    </div>

    <!-- Hero -->
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 24px 32px;">
      <p class="mono" style="font-size:10px;letter-spacing:0.3em;color:#71717a;margin-bottom:32px;">THE HUNT IS ON.</p>
      <h1 class="glow-text" style="font-size:36px;font-weight:800;color:#00FFC2;line-height:1.15;margin-bottom:12px;">ARE YOU<br>READY?</h1>
      <p style="color:#a1a1aa;font-size:14px;">Find. Scan. Conquer.</p>
    </div>

    <!-- CTA -->
    <div style="padding:0 24px;margin-bottom:40px;">
      <a href="scan.html">
        <button class="btn-primary glow-btn-shadow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          START HUNT
        </button>
      </a>
    </div>

    <!-- Features -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:0 24px;margin-bottom:48px;">
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;">
        <div class="glass" style="width:56px;height:56px;border-radius:999px;display:flex;align-items:center;justify-content:center;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00FFC2" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <span class="mono" style="font-size:11px;letter-spacing:0.05em;color:#00FFC2;font-weight:600;">FIND</span>
        <span style="font-size:11px;color:#71717a;line-height:1.3;">Locate hidden markers nearby</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;">
        <div class="glass" style="width:56px;height:56px;border-radius:999px;display:flex;align-items:center;justify-content:center;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00FFC2" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
        </div>
        <span class="mono" style="font-size:11px;letter-spacing:0.05em;color:#00FFC2;font-weight:600;">SCAN</span>
        <span style="font-size:11px;color:#71717a;line-height:1.3;">Unlock rewards with your camera</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;">
        <div class="glass" style="width:56px;height:56px;border-radius:999px;display:flex;align-items:center;justify-content:center;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00FFC2" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M17 4h3a2 2 0 0 1 2 2c0 2-2 4-4 4M7 4H4a2 2 0 0 0-2 2c0 2 2 4 4 4"/></svg>
        </div>
        <span class="mono" style="font-size:11px;letter-spacing:0.05em;color:#00FFC2;font-weight:600;">CONQUER</span>
        <span style="font-size:11px;color:#71717a;line-height:1.3;">Climb the global leaderboard</span>
      </div>
    </div>

    <div style="margin-top:auto;text-align:center;padding:0 24px 24px;">
      <p style="font-size:14px;color:#d4d4d8;">Your Adventure <span class="glow-text" style="color:#00FFC2;font-weight:600;">Starts Here</span></p>
    </div>

    <nav class="bottom-nav glass">
      <a href="index.html" class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label mono">Home</span>
      </a>
      <a href="profile.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span class="nav-label mono">Profile</span>
      </a>
      <a href="leaderboard.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M17 4h3a2 2 0 0 1 2 2c0 2-2 4-4 4M7 4H4a2 2 0 0 0-2 2c0 2 2 4 4 4"/></svg>
        <span class="nav-label mono">Leaderboard</span>
      </a>
    </nav>

  </div>
</body>
</html>
